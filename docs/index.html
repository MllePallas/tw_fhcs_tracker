<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>台灣金控月自結獲利追蹤</title>
  <meta name="description" content="13 家台灣上市金控每月自結損益追蹤：合併稅後淨利、累計 YoY、EPS、子公司明細與市場概況。資料來源：公開資訊觀測站（MOPS）。" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="台灣金控月自結獲利追蹤" />
  <meta property="og:description" content="13 家上市金控每月自結損益、累計 YoY、EPS 與子公司明細。" />
  <meta name="twitter:card" content="summary" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Header ── -->
  <header>
    <div class="header-inner">
      <div class="header-title">
        <h1>🏦 台灣金控月自結獲利</h1>
        <p class="subtitle">13 家上市金控 ｜ 資料來源：公開資訊觀測站</p>
      </div>
      <div class="header-actions">
        <div class="period-badge" id="period-badge">載入中...</div>
      </div>
    </div>
  </header>

  <!-- ── Status Bar ── -->
  <div id="status-bar" class="status-bar hidden"></div>

  <!-- ── Main ── -->
  <main>

    <!-- 篩選 & 排序列 -->
    <div class="controls">
      <div class="controls-left">
        <span class="last-updated" id="last-updated"></span>
      </div>
      <div class="controls-right">
        <div class="ctrl-group ctrl-month">
          <label>月份：</label>
          <select id="month-select" onchange="onMonthChange()">
            <option value="">載入中...</option>
          </select>
        </div>
        <div class="ctrl-group">
          <label>排序：</label>
          <select id="sort-select" onchange="renderAll()">
            <option value="code">代號</option>
            <option value="monthly_desc">當月獲利 ↓</option>
            <option value="monthly_asc">當月獲利 ↑</option>
            <option value="cumulative_desc">累計獲利 ↓</option>
            <option value="cumul_yoy_desc">累計 YoY ↓</option>
            <option value="eps_cumul_desc">累計 EPS ↓</option>
          </select>
        </div>
        <div class="ctrl-group">
          <label>單位：</label>
          <select id="unit-select" onchange="renderAll()">
            <option value="百萬元" selected>百萬元 (NT$m)</option>
            <option value="億元">億元</option>
          </select>
        </div>
        <div class="ctrl-group ctrl-download">
          <button id="btn-download" class="btn-download" onclick="downloadExcel()" title="下載當前月份完整內容（xlsx）">
            <span class="btn-download-icon">📥</span>
            <span class="btn-download-text">下載 Excel</span>
          </button>
        </div>
      </div>
    </div>

    <!-- 本月市場概況 -->
    <div class="market-section hidden" id="market-section">
      <div class="market-header">
        <span class="market-title">📊 本月市場概況</span>
        <span class="market-meta" id="market-meta"></span>
      </div>
      <div class="market-cards" id="market-cards"></div>
    </div>

    <!-- 摘要卡片 -->
    <div class="summary-cards" id="summary-cards"></div>

    <!-- 視角 Tab -->
    <div class="industry-tabs" id="industry-tabs">
      <button class="tab active" data-view="holdings" onclick="setView('holdings')">🏦 金控總覽</button>
      <button class="tab"        data-view="bank"     onclick="setView('bank')">💰 銀行</button>
      <button class="tab"        data-view="life"     onclick="setView('life')">🛡️ 壽險</button>
      <button class="tab"        data-view="securities" onclick="setView('securities')">📊 證券</button>
    </div>

    <!-- 表格單位標示（跟著單位選單動態變化） -->
    <div class="table-unit-hint" id="table-unit-hint"></div>

    <!-- 主表格（桌機） -->
    <div class="table-container">
      <table id="main-table">
        <thead id="main-thead"></thead>
        <tbody id="main-tbody">
          <tr><td colspan="9" class="loading-cell">載入資料中...</td></tr>
        </tbody>
        <tfoot id="main-tfoot"></tfoot>
      </table>
    </div>

    <!-- 主表卡片（手機） -->
    <div class="mobile-cards" id="mobile-cards">
      <div class="m-empty">載入資料中...</div>
    </div>

    <!-- 子公司明細（展開用） -->
    <div id="detail-panel" class="detail-panel hidden">
      <div class="detail-header">
        <h3 id="detail-title"></h3>
        <button onclick="closeDetail()" class="btn btn-close">✕</button>
      </div>
      <div id="detail-content"></div>
    </div>

    <!-- 歷史趨勢圖表 -->
    <div class="section-title" id="bar-chart-title">📈 當月獲利比較</div>
    <div class="chart-container">
      <canvas id="bar-chart"></canvas>
    </div>

    <div class="section-title" id="cumul-chart-title">📊 累計獲利比較（本年累計）</div>
    <div class="chart-container">
      <canvas id="cumul-chart"></canvas>
    </div>

  </main>

  <!-- ── Footer ── -->
  <footer class="site-footer">
    <p class="copyright">© 2026 Mandy Chao. All Rights Reserved.</p>
    <p class="disclaimer">本網站為個人開發與維護之專案，所有資料來源均為公開資訊。本網站內容僅供資訊參考，不構成投資建議。</p>
  </footer>

  <!-- ── Scripts ── -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
