name: Update Financial Holdings Data

on:
  # 每月 8-31 日，台灣時間 17:00 與 20:00 各執行一次
  # （UTC 09:00 / 12:00；後續若該月 13 家已收齊，short-circuit 會直接 skip）
  schedule:
    - cron: '0 9,12 8-31 * *'

  # 允許手動觸發
  workflow_dispatch:
    inputs:
      target_month:
        description: '目標月份（民國年/月，例如 115/03）；留空則自動判斷'
        required: false
        default: ''
      stock_codes:
        description: '指定公司代號，空格分隔（例如 2881 2882）；留空則爬取全部'
        required: false
        default: ''
      enable_llm:
        description: '是否啟用 LLM 兜底解析（true/false）'
        required: false
        default: 'true'

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 允許 push 到 repo

    steps:
      # ── 1. Checkout ──────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Short-circuit：若該月已收齊 13 家，直接結束 ──
      # 只在 schedule 觸發時檢查；workflow_dispatch 不檢查，方便重跑
      - name: Check if target month already complete
        id: check
        if: github.event_name == 'schedule'
        run: |
          # 計算目標月份 = 上個月（以該月 15 日為基準避開月底邊界），轉成民國年/月
          PREV=$(date -u -d "$(date -u +%Y-%m-15) -1 month" +'%Y-%m')
          PREV_Y=${PREV%-*}
          PREV_M=${PREV#*-}
          TARGET=$(printf '%03d/%02d' $((PREV_Y - 1911)) $((10#$PREV_M)))
          PERIOD=$(jq -r '.report_period // ""' docs/data/latest.json 2>/dev/null || echo "")
          SUCCESS=$(jq -r '.success_count // 0' docs/data/latest.json 2>/dev/null || echo "0")
          echo "Target month: $TARGET"
          echo "Latest period: $PERIOD, success_count: $SUCCESS"
          if [ "$PERIOD" = "$TARGET" ] && [ "$SUCCESS" -ge 13 ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "✅ Target month $TARGET already collected ($SUCCESS/13) — skipping"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      # ── 3. Python 環境 ───────────────────────────────
      - name: Set up Python 3.11
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        if: steps.check.outputs.skip != 'true'
        run: |
          pip install -r requirements.txt

      # ── 4. 執行爬蟲 ──────────────────────────────────
      - name: Run scraper
        if: steps.check.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd scraper

          # 組裝參數
          ARGS=""

          # 指定月份
          if [ -n "${{ github.event.inputs.target_month }}" ]; then
            ARGS="$ARGS --month ${{ github.event.inputs.target_month }}"
          fi

          # 指定公司
          if [ -n "${{ github.event.inputs.stock_codes }}" ]; then
            ARGS="$ARGS --codes ${{ github.event.inputs.stock_codes }}"
          fi

          # LLM 設定
          if [ "${{ github.event.inputs.enable_llm }}" = "false" ]; then
            ARGS="$ARGS --no-llm"
          fi

          python main.py $ARGS

      # ── 4b. 補上新聞摘要（僅當該月已收齊 13 家）──────
      - name: Generate news summaries
        if: steps.check.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          SUCCESS=$(jq -r '.success_count // 0' docs/data/latest.json 2>/dev/null || echo "0")
          if [ "$SUCCESS" -ge 13 ]; then
            echo "All 13 collected — generating news summaries (idempotent)..."
            cd scraper
            python news_summary.py
          else
            echo "Only $SUCCESS/13 collected; skipping news summaries (next run will retry)"
          fi

      # ── 4c. 補上壽險 FVOCI 調整後獲利（僅當該月已收齊 13 家）──
      - name: Generate FVOCI adjustment
        if: steps.check.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          SUCCESS=$(jq -r '.success_count // 0' docs/data/latest.json 2>/dev/null || echo "0")
          if [ "$SUCCESS" -ge 13 ]; then
            echo "All 13 collected — generating FVOCI adjustments for life insurance subs (idempotent)..."
            cd scraper
            python fvoci_adjustment.py
          else
            echo "Only $SUCCESS/13 collected; skipping FVOCI adjustment (next run will retry)"
          fi

      # ── 5. 提交更新的資料 ─────────────────────────────
      - name: Commit updated data
        if: steps.check.outputs.skip != 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/data/
          # 如果沒有變更就跳過
          git diff --staged --quiet || git commit -m "chore: update financial data $(date +'%Y-%m-%d %H:%M')"
          git push

      # ── 6. 失敗通知（可選）────────────────────────────
      - name: Report failure
        if: failure()
        run: |
          echo "❌ Scraping failed! Check the logs above."
