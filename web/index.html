<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>台灣金控月自結獲利追蹤</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Header ── -->
  <header>
    <div class="header-inner">
      <div class="header-title">
        <h1>🏦 台灣金控月自結獲利</h1>
        <p class="subtitle">13 家上市金控 ｜ 資料來源：公開資訊觀測站</p>
      </div>
      <div class="header-actions">
        <div class="period-badge" id="period-badge">載入中...</div>
        <button id="update-btn" class="btn btn-primary" onclick="triggerUpdate()">
          🔄 更新資料
        </button>
      </div>
    </div>
  </header>

  <!-- ── Status Bar ── -->
  <div id="status-bar" class="status-bar hidden"></div>

  <!-- ── Main ── -->
  <main>

    <!-- 篩選 & 排序列 -->
    <div class="controls">
      <div class="controls-left">
        <span class="last-updated" id="last-updated"></span>
      </div>
      <div class="controls-right">
        <label>月份：</label>
        <select id="month-select" onchange="onMonthChange()">
          <option value="">載入中...</option>
        </select>
        <label>排序：</label>
        <select id="sort-select" onchange="renderAll()">
          <option value="code">代號</option>
          <option value="monthly_desc">當月獲利 ↓</option>
          <option value="monthly_asc">當月獲利 ↑</option>
          <option value="cumulative_desc">累計獲利 ↓</option>
        </select>
        <label>單位：</label>
        <select id="unit-select" onchange="renderAll()">
          <option value="百萬元" selected>百萬元 (NT$m)</option>
          <option value="億元">億元</option>
          <option value="千元">千元</option>
        </select>
      </div>
    </div>

    <!-- 摘要卡片 -->
    <div class="summary-cards" id="summary-cards"></div>

    <!-- 主表格 -->
    <div class="table-container">
      <table id="main-table">
        <thead>
          <tr>
            <th rowspan="2" class="col-code">代號</th>
            <th rowspan="2" class="col-name">金控</th>
            <th colspan="2" class="col-group">合併稅後淨利</th>
            <th rowspan="2" class="col-status">狀態</th>
            <th rowspan="2" class="col-source">來源</th>
          </tr>
          <tr>
            <th class="col-monthly" id="monthly-header">當月</th>
            <th class="col-cumulative">累計</th>
          </tr>
        </thead>
        <tbody id="main-tbody">
          <tr><td colspan="6" class="loading-cell">載入資料中...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- 子公司明細（展開用） -->
    <div id="detail-panel" class="detail-panel hidden">
      <div class="detail-header">
        <h3 id="detail-title"></h3>
        <button onclick="closeDetail()" class="btn btn-close">✕</button>
      </div>
      <div id="detail-content"></div>
    </div>

    <!-- 歷史趨勢圖表 -->
    <div class="section-title">📈 當月獲利比較</div>
    <div class="chart-container">
      <canvas id="bar-chart"></canvas>
    </div>

  </main>

  <!-- ── GitHub Actions 觸發 Modal ── -->
  <div id="trigger-modal" class="modal hidden">
    <div class="modal-box">
      <h3>🔄 觸發資料更新</h3>
      <p>輸入你的 GitHub Personal Access Token（需要 <code>repo</code> 或 <code>actions:write</code> 權限）</p>
      <div class="form-group">
        <label>GitHub Token</label>
        <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxx" />
      </div>
      <div class="form-group">
        <label>GitHub 使用者名稱</label>
        <input type="text" id="gh-user" placeholder="your-username" />
      </div>
      <div class="form-group">
        <label>Repository 名稱</label>
        <input type="text" id="gh-repo" placeholder="taiwan-finhold-tracker" value="taiwan-finhold-tracker" />
      </div>
      <div class="form-group">
        <label>目標月份（選填，留空自動判斷）</label>
        <input type="text" id="gh-month" placeholder="115/03" />
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" onclick="confirmTrigger()">確認觸發</button>
      </div>
      <p class="token-note">⚠️ Token 僅在本次使用，不會儲存</p>
    </div>
  </div>
  <div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal()"></div>

  <!-- ── Scripts ── -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
